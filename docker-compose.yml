version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ims_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ims_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ims_raw
      REDIS_URL: redis://redis:6379/0
      SIGNAL_QUEUE_MAXSIZE: 50000
      SIGNAL_WORKER_CONCURRENCY: 20
      DEBOUNCE_WINDOW_SECONDS: 10
      LOAD_BALANCER_SHARDS: 4
      RATE_LIMIT_GLOBAL: 10000
      RATE_LIMIT_PER_IP: 1000
      RATE_LIMIT_WINDOW_SECONDS: 10
    depends_on:
      - postgres
      - mongo
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  redis_data:
